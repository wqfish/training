name: TrainingLog
options:
  bundleIdPrefix: com.qinfan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    # Apple Developer team, used for code signing when running on a device.
    DEVELOPMENT_TEAM: "4QBTGP2M6U"
targets:
  TrainingLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrainingLog
    # An explicit Info.plist (generation disabled below) so UIBackgroundModes can
    # be declared — remote notifications let CloudKit push store changes to the
    # app while it's backgrounded. XcodeGen fills in the standard CFBundle* keys.
    info:
      path: TrainingLog/Info.plist
      properties:
        CFBundleDisplayName: Training Log
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qinfan.TrainingLog
        PRODUCT_NAME: TrainingLog
        # Entitlements declare the iCloud/CloudKit container used for SwiftData sync.
        CODE_SIGN_ENTITLEMENTS: TrainingLog/TrainingLog.entitlements
        # Use the explicit Info.plist above instead of a generated one; the two
        # conflict if both are active.
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
  TrainingLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrainingLogTests
    dependencies:
      - target: TrainingLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qinfan.TrainingLogTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  TrainingLog:
    build:
      targets:
        TrainingLog: all
        TrainingLogTests: all
    test:
      gatherCoverageData: true
      targets:
        - TrainingLogTests
