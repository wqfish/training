name: TrainingLog
options:
  bundleIdPrefix: com.qinfan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
targets:
  TrainingLog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrainingLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qinfan.TrainingLog
        PRODUCT_NAME: TrainingLog
        INFOPLIST_KEY_CFBundleDisplayName: "Training Log"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
  TrainingLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrainingLogTests
    dependencies:
      - target: TrainingLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qinfan.TrainingLogTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  TrainingLog:
    build:
      targets:
        TrainingLog: all
        TrainingLogTests: all
    test:
      gatherCoverageData: true
      targets:
        - TrainingLogTests
